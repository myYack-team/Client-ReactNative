name: EAS Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:  # 수동 실행 허용
    inputs:
      profile:
        description: 'Build profile (development/preview/production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. EAS CLI 설치
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 4. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 5. 환경변수 파일 생성
      - name: Create .env file
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_KAKAO_REST_API_KEY=${{ secrets.EXPO_PUBLIC_KAKAO_REST_API_KEY }}
          EOF

      # 6. 빌드 실행 (main 브랜치 push 시)
      - name: Build (auto - preview)
        if: github.event_name == 'push'
        run: eas build --platform android --profile preview --non-interactive

      # 7. 빌드 실행 (수동 실행 시)
      - name: Build (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.platform }}" = "all" ]; then
            eas build --platform all --profile ${{ inputs.profile }} --non-interactive
          else
            eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
          fi

  # Production 빌드 후 자동 제출 (선택적)
  submit:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # Google Play 서비스 계정 키 생성
      - name: Create Google Play service account key
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > google-play-service-account.json

      # Google Play 내부 테스트 트랙에 제출
      - name: Submit to Google Play
        if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        run: eas submit --platform android --latest --non-interactive
